name: Destroy DR Orchestration Only

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:

jobs:
  destroy_partial:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::174512274809:role/github-actions-terraform-role
          aws-region: us-east-1
          role-duration-seconds: 7200

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Make partial destroy script executable
        run: chmod +x scripts/deployment-automation-scripts/destroy-orchestration-only.sh

      - name: Run Partial Destroy Script
        run: ./scripts/deployment-automation-scripts/destroy-orchestration-only.sh

      - name: Upload errored state if present
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: errored-tfstate
          path: |
            **/errored.tfstate
          if-no-files-found: ignore
